[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pypsa-demo"
version = "0.1.0"
description = "IEEE 4-Bus topology variations implemented in PyPSA"
requires-python = ">=3.9"
dependencies = [
    "pypsa>=0.21.0",
    "pandas>=1.5.0",
    "numpy>=1.21.0",
]
